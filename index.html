<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Racing - Trackmania Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; overflow: hidden; background: #000; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            z-index: 100; background: rgba(0, 0, 0, 0.7);
            padding: 15px; border-radius: 10px; border: 2px solid #00ffff;
        }
        #speed { font-size: 28px; font-weight: bold; color: #00ff00; }
        #mainMenuScreen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #111; z-index: 3000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-button {
            background: #00ffff; color: #000; border: none; 
            padding: 20px 50px; font-size: 1.5em; cursor: pointer;
            font-weight: bold; margin-top: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="ui" class="hidden">
        <div>SPEED: <span id="speed">0</span> KM/H</div>
    </div>

    <div id="mainMenuScreen">
        <h1 style="color: white; font-style: italic;">TRACKMANIA EVO</h1>
        <button class="menu-button" onclick="startQuickRace()">START RACE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car;
        let gameStarted = false, keys = {};
        let trackPoints = [];

        const carPhysics = {
            pos: new THREE.Vector3(0, 2, 0),
            vel: new THREE.Vector3(0, 0, 0),
            rot: 0,
            speed: 0,
            maxSpeed: 5, // Internal units
            accel: 0.01,
            friction: 0.98
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Setup Keys
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        function createCar() {
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0x00ffff })
            );
            car = new THREE.Group();
            car.add(body);
            scene.add(car);
        }

        function createTrack() {
            const points = [];
            for(let i=0; i<200; i++) {
                points.push(new THREE.Vector3(Math.sin(i*0.1)*20, Math.sin(i*0.05)*10, i*15));
            }
            trackPoints = points;

            const shape = new THREE.Shape();
            shape.moveTo(-6, 0); shape.lineTo(6, 0); // Flat road

            const extrudeSettings = { steps: 200, bevelEnabled: false, extrudePath: new THREE.CatmullRomCurve3(points) };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const material = new THREE.MeshStandardMaterial({ color: 0x222222, wireframe: false });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        }

        function startQuickRace() {
            document.getElementById('mainMenuScreen').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            createTrack();
            createCar();
            
            // Set initial position
            carPhysics.pos.copy(trackPoints[0]).y += 2;
            gameStarted = true;
        }

        function update() {
            if(!gameStarted) return;

            // Simple movement
            if(keys['w']) carPhysics.speed += carPhysics.accel;
            if(keys['s']) carPhysics.speed -= carPhysics.accel;
            carPhysics.speed *= carPhysics.friction;

            if(keys['a']) carPhysics.rot += 0.03;
            if(keys['d']) carPhysics.rot -= 0.03;

            const direction = new THREE.Vector3(Math.sin(carPhysics.rot), 0, Math.cos(carPhysics.rot));
            carPhysics.pos.add(direction.multiplyScalar(carPhysics.speed));

            car.position.copy(carPhysics.pos);
            car.rotation.y = carPhysics.rot;

            // Camera follow
            const camOffset = new THREE.Vector3(0, 5, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), carPhysics.rot);
            camera.position.lerp(carPhysics.pos.clone().add(camOffset), 0.1);
            camera.lookAt(carPhysics.pos);

            document.getElementById('speed').textContent = Math.round(carPhysics.speed * 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
