<h1> Welcome to my site where i display my games that i have coded in the past.</h1>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Racing - Checkpoint Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            z-index: 100; background: rgba(0, 0, 0, 0.6);
            padding: 15px; border-radius: 10px; border: 1px solid #00ff00;
        }
        #speed { font-size: 24px; font-weight: bold; color: #00ff00; }
        #time { font-size: 24px; font-weight: bold; color: #ffffff; }

        /* Time Bonus Pop-up */
        #bonusPop {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            color: #00ff00; font-size: 30px; font-weight: bold;
            text-shadow: 0 0 10px #00ff00; display: none; z-index: 500;
            animation: fadeUp 1s ease-out;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -50px); }
        }

        #mainMenuScreen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-button {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000; border: none; padding: 20px 40px;
            font-size: 1.5em; border-radius: 30px; cursor: pointer;
            margin: 15px; font-weight: bold; min-width: 250px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="bonusPop">TIME BONUS -3.0s</div>
    
    <div id="ui" class="hidden">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Time: <span id="time">0.0</span>s</div>
        <div>CP: <span id="cpCount">0</span></div>
    </div>

    <div id="mainMenuScreen">
        <h1 style="color: #00ff00; margin-bottom: 50px;">🏎️ ARCADE RACING</h1>
        <button class="menu-button" onclick="startQuickRace()">START RACE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car;
        let trackPoints = [], checkpoints = [];
        let gameStarted = false, startTime = 0, bonusTime = 0;
        let keys = {};
        let lastCheckpointPos = new THREE.Vector3();
        let lastCheckpointRot = 0;

        const carPhysics = {
            position: new THREE.Vector3(0, 2, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
            speed: 0,
            maxSpeed: 8, // Internal units (high speed)
            accel: 0.15,
            friction: 0.98
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);
            scene.fog = new THREE.Fog(0x000011, 50, 1000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 50, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if(e.key.toLowerCase() === 'r') resetToLastCheckpoint();
            });
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        function createTrack() {
            const points = [];
            for (let i = 0; i < 200; i++) {
                // Creates a winding hilly track
                const x = Math.sin(i * 0.15) * 40;
                const y = Math.cos(i * 0.1) * 10;
                const z = i * 40;
                points.push(new THREE.Vector3(x, y, z));
            }
            trackPoints = points;

            const curve = new THREE.CatmullRomCurve3(points);
            const geometry = new THREE.TubeGeometry(curve, 200, 12, 12, false);
            const material = new THREE.MeshStandardMaterial({ color: 0x222222, wireframe: false });
            const trackMesh = new THREE.Mesh(geometry, material);
            scene.add(trackMesh);

            // Add Neon Gates (Checkpoints)
            checkpoints = [];
            for (let i = 20; i < points.length; i += 30) {
                const gateGeo = new THREE.TorusGeometry(14, 0.8, 16, 32);
                const gateMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 });
                const gate = new THREE.Mesh(gateGeo, gateMat);
                
                gate.position.copy(points[i]);
                gate.lookAt(points[i+1]);
                gate.userData = { collected: false, index: i };
                
                scene.add(gate);
                checkpoints.push(gate);
            }
        }

        function createCar() {
            if (car) scene.remove(car);
            car = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0x00ffff })
            );
            car.add(body);
            scene.add(car);
        }

        function startQuickRace() {
            document.getElementById('mainMenuScreen').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            
            createTrack();
            createCar();
            
            // Spawn car
            carPhysics.position.copy(trackPoints[0]).y += 2;
            lastCheckpointPos.copy(carPhysics.position);
            
            gameStarted = true;
            startTime = Date.now();
            bonusTime = 0;
        }

        function resetToLastCheckpoint() {
            carPhysics.position.copy(lastCheckpointPos);
            carPhysics.velocity.set(0,0,0);
            carPhysics.speed = 0;
            carPhysics.rotation = lastCheckpointRot;
        }

        function showBonus() {
            const el = document.getElementById('bonusPop');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1000);
        }

        function update() {
            if (!gameStarted) return;

            // Physics
            if (keys['w']) carPhysics.speed += carPhysics.accel;
            if (keys['s']) carPhysics.speed -= carPhysics.accel;
            carPhysics.speed *= carPhysics.friction;

            if (keys['a']) carPhysics.rotation += 0.04;
            if (keys['d']) carPhysics.rotation -= 0.04;

            const dir = new THREE.Vector3(Math.sin(carPhysics.rotation), 0, Math.cos(carPhysics.rotation));
            carPhysics.velocity.copy(dir.multiplyScalar(carPhysics.speed));
            carPhysics.position.add(carPhysics.velocity);
            
            car.position.copy(carPhysics.position);
            car.rotation.y = carPhysics.rotation;

            // Checkpoint Hit Detection
            checkpoints.forEach(cp => {
                if (!cp.userData.collected) {
                    if (car.position.distanceTo(cp.position) < 15) {
                        cp.userData.collected = true;
                        cp.material.color.set(0xffff00); // Turn Yellow
                        bonusTime += 3000; // Subtract 3 seconds (in ms)
                        showBonus();
                        lastCheckpointPos.copy(cp.position);
                        lastCheckpointRot = carPhysics.rotation;
                        document.getElementById('cpCount').innerText = checkpoints.filter(c => c.userData.collected).length;
                    }
                }
            });

            // Camera
            const camOffset = new THREE.Vector3(0, 6, -18).applyAxisAngle(new THREE.Vector3(0, 1, 0), carPhysics.rotation);
            camera.position.lerp(carPhysics.position.clone().add(camOffset), 0.1);
            camera.lookAt(carPhysics.position);

            // UI
            const currentTime = (Date.now() - startTime - bonusTime) / 1000;
            document.getElementById('speed').textContent = Math.round(carPhysics.speed * 100);
            document.getElementById('time').textContent = currentTime.toFixed(2);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
