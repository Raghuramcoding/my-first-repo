<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Racing - Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            z-index: 100; background: rgba(0, 0, 0, 0.5);
            padding: 15px; border-radius: 10px; display: none;
        }
        #speed { font-size: 24px; font-weight: bold; color: #00ff00; }
        #mainMenuScreen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-button {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000; border: none; padding: 20px 40px;
            font-size: 1.5em; border-radius: 30px; cursor: pointer;
            margin: 15px; font-weight: bold; min-width: 250px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    
    <div id="ui">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Time: <span id="time">0.0</span>s</div>
    </div>

    <div id="mainMenuScreen">
        <h1 style="color: #00ff00; margin-bottom: 50px;">🏎️ ARCADE RACING</h1>
        <button class="menu-button" onclick="startQuickRace()">QUICK RACE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car;
        let track = [], checkpoints = [];
        let gameStarted = false, startTime = 0, keys = {};
        
        const carPhysics = {
            position: new THREE.Vector3(0, 2, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
            speed: 0,
            maxSpeed: 2.0,
            accel: 0.05,
            friction: 0.96
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        function createCar() {
            if (car) scene.remove(car);
            car = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.8, 4),
                new THREE.MeshStandardMaterial({ color: 0x0066ff })
            );
            car.add(body);
            scene.add(car);
        }

        function createTrack() {
            const points = [];
            for (let i = 0; i < 100; i++) {
                points.push(new THREE.Vector3(Math.sin(i * 0.2) * 20, 0, i * 10));
            }
            track = points;

            const shape = new THREE.Shape();
            shape.moveTo(-5, 0); shape.lineTo(5, 0);
            
            const extrudeSettings = { steps: 100, bevelEnabled: false, extrudePath: new THREE.CatmullRomCurve3(points) };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0x333333 }));
            scene.add(mesh);
        }

        function startQuickRace() {
            document.getElementById('mainMenuScreen').classList.add('hidden');
            document.getElementById('ui').style.display = 'block';
            
            createTrack();
            createCar();
            
            // Spawn car at start of track
            carPhysics.position.copy(track[0]).y += 1;
            carPhysics.velocity.set(0,0,0);
            carPhysics.speed = 0;
            
            gameStarted = true;
            startTime = Date.now();
        }

        function update() {
            if (!gameStarted) return;

            // Simple movement
            if (keys['w']) carPhysics.speed += carPhysics.accel;
            if (keys['s']) carPhysics.speed -= carPhysics.accel;
            carPhysics.speed *= carPhysics.friction;

            if (keys['a']) carPhysics.rotation += 0.04;
            if (keys['d']) carPhysics.rotation -= 0.04;

            const dir = new THREE.Vector3(Math.sin(carPhysics.rotation), 0, Math.cos(carPhysics.rotation));
            carPhysics.position.add(dir.multiplyScalar(carPhysics.speed));
            
            car.position.copy(carPhysics.position);
            car.rotation.y = carPhysics.rotation;

            // Camera
            const camOffset = new THREE.Vector3(0, 5, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), carPhysics.rotation);
            camera.position.lerp(carPhysics.position.clone().add(camOffset), 0.1);
            camera.lookAt(carPhysics.position);

            document.getElementById('speed').textContent = Math.round(carPhysics.speed * 100);
            document.getElementById('time').textContent = ((Date.now() - startTime)/1000).toFixed(1);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
