<h1> Welcome to my site where i display my games that i have coded in the past.</h1>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Racing - Full Version Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; z-index: 100; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 10px; }
        #ui div { margin: 5px 0; }
        #speed { font-size: 24px; font-weight: bold; color: #00ff00; }
        #crashWarning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 0, 0, 0.9); color: white; padding: 20px 40px; border-radius: 10px; font-size: 24px; font-weight: bold; z-index: 200; display: none; text-align: center; border: 3px solid #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); }
        #startScreen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 40px; border-radius: 15px; text-align: center; z-index: 1000; border: 2px solid #00ff00; }
        #levelSelectScreen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 2000; overflow-y: auto; padding: 20px; }
        #levelSelectScreen h1 { text-align: center; color: #00ff00; font-size: 3em; margin-bottom: 20px; }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .level-button { background: linear-gradient(135deg, #333, #222); border: 2px solid #555; color: white; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.3s ease; }
        .level-button:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0, 255, 0, 0.5); border-color: #00ff00; }
        .level-button.locked { opacity: 0.5; cursor: not-allowed; }
        #mainMenuScreen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-button { background: linear-gradient(45deg, #00ff00, #00cc00); color: #000; border: none; padding: 20px 40px; font-size: 1.5em; border-radius: 30px; cursor: pointer; margin: 15px; font-weight: bold; min-width: 250px; }
        #trackEditorScreen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 4000; display: none; }
        .editor-toolbar { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; color: white; z-index: 4001; }
        .editor-toolbar button { background: #444; color: white; border: none; padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="ui">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Time: <span id="time">0.0</span>s</div>
        <div>Checkpoint: <span id="checkpoint">0</span> / <span id="totalCheckpoints">0</span></div>
    </div>
    <div id="crashWarning">CRASHED!</div>

    <div id="mainMenuScreen">
        <h1 style="font-size: 4em; color: #00ff00; margin-bottom: 50px;">🏎️ 3D ARCADE RACING</h1>
        <button class="menu-button" onclick="showLevelSelect()">CAMPAIGN</button>
        <button class="menu-button" onclick="startQuickRace()">QUICK RACE</button>
        <button class="menu-button" onclick="showTrackEditor()">TRACK EDITOR</button>
    </div>

    <div id="levelSelectScreen" class="hidden">
        <button style="padding:10px;" onclick="showMainMenu()">← Back</button>
        <h1>SELECT TRACK</h1>
        <div class="level-grid" id="levelGrid"></div>
    </div>

    <div id="trackEditorScreen">
        <div class="editor-toolbar">
            <h3>Track Editor</h3>
            <button onclick="editorAddPoint()">Add Point</button>
            <button onclick="editorClearTrack()">Clear</button>
            <button onclick="editorTestTrack()">Test Track</button>
            <button onclick="showMainMenu()">Exit</button>
            <div id="editorMode">Mode: Add</div>
        </div>
        <div id="editorContainer" style="width:100%; height:100%;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car, carBody;
        let track = [], checkpoints = [];
        let gameStarted = false, startTime = 0, currentCheckpoint = 0;
        let keys = {}, lastCheckpointPosition = new THREE.Vector3(0, 2, 0);
        let currentLevel = 0, trackProgress = {};

        // Track Configs
        const trackConfigs = [];
        for (let i = 0; i < 25; i++) {
            trackConfigs.push({
                name: `Track ${i + 1}`,
                segments: 200 + (i * 10),
                complexity: 1 + (i * 0.1),
                turns: 3 + Math.floor(i / 5),
                jumps: Math.floor(i / 8) + 1,
                radius: 40 + (i * 2)
            });
        }

        const carPhysics = {
            position: new THREE.Vector3(0, 2, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
            speed: 0,
            maxSpeed: 3.5,
            acceleration: 0.04,
            friction: 0.97,
            gravity: 0.015
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x2d5016 }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            createCar();
            loadProgress();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            document.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if(e.key.toLowerCase() === 'r') resetCar();
            });
            document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        }

        function createCar() {
            car = new THREE.Group();
            carBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({ color: 0x0066ff }));
            car.add(carBody);
            scene.add(car);
        }

        function getTrackHeight(pos) {
            let minDist = Infinity;
            let nearestHeight = 0;
            for (let i = 0; i < track.length; i++) {
                const d = pos.distanceTo(track[i]);
                if (d < minDist) {
                    minDist = d;
                    nearestHeight = track[i].y;
                }
            }
            return (minDist > 7) ? 0 : nearestHeight; // If far from track, ground is 0
        }

        function updateCar() {
            if (!gameStarted) return;

            let acc = 0, turn = 0;
            if (keys['w'] || keys['arrowup']) acc = carPhysics.acceleration;
            if (keys['s'] || keys['arrowdown']) acc = -carPhysics.acceleration;
            if (keys['a'] || keys['arrowleft']) turn = 0.04;
            if (keys['d'] || keys['arrowright']) turn = -0.04;

            const targetHeight = getTrackHeight(carPhysics.position);
            const isOnGround = carPhysics.position.y <= targetHeight + 1.1;

            carPhysics.rotation += turn * (carPhysics.speed * 0.5);
            const forward = new THREE.Vector3(Math.sin(carPhysics.rotation), 0, Math.cos(carPhysics.rotation));

            if (isOnGround) {
                carPhysics.velocity.add(forward.multiplyScalar(acc));
                carPhysics.velocity.multiplyScalar(carPhysics.friction);
                carPhysics.position.y = targetHeight + 1;
                carPhysics.velocity.y = 0;
            } else {
                carPhysics.velocity.y -= carPhysics.gravity;
            }

            carPhysics.speed = new THREE.Vector3(carPhysics.velocity.x, 0, carPhysics.velocity.z).length();
            carPhysics.position.add(carPhysics.velocity);
            car.position.copy(carPhysics.position);
            car.rotation.y = carPhysics.rotation;

            if (carPhysics.position.y < -30) resetCar();
            checkCheckpoints();
        }

        function checkCheckpoints() {
            if (track.length === 0) return;
            const finishPos = track[track.length-1];
            if (carPhysics.position.distanceTo(finishPos) < 10) {
                const timeTaken = (Date.now() - startTime) / 1000;
                completeLevel(timeTaken);
            }
        }

        function resetCar() {
            carPhysics.position.copy(lastCheckpointPosition).add(new THREE.Vector3(0, 2, 0));
            carPhysics.velocity.set(0, 0, 0);
            carPhysics.speed = 0;
        }

        function createTrack(cfg) {
            resetScene();
            const path = [];
            for (let i = 0; i <= cfg.segments; i++) {
                const t = i / cfg.segments;
                const angle = t * Math.PI * cfg.turns;
                const radius = cfg.radius + Math.sin(t * 10) * 5;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                let y = Math.sin(t * 8) * 4;
                if (t > 0.4 && t < 0.45) y += 8; // Jump
                path.push(new THREE.Vector3(x, y, z));
            }
            track = path;
            renderTrackMesh(path);
        }

        function renderTrackMesh(path) {
            const geo = new THREE.BufferGeometry();
            const verts = [];
            for(let i=0; i<path.length-1; i++) {
                const p1 = path[i], p2 = path[i+1];
                const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                const right = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(4);
                verts.push(p1.x+right.x, p1.y, p1.z+right.z, p1.x-right.x, p1.y, p1.z-right.z, p2.x+right.x, p2.y, p2.z+right.z);
                verts.push(p1.x-right.x, p1.y, p1.z-right.z, p2.x-right.x, p2.y, p2.z-right.z, p2.x+right.x, p2.y, p2.z+right.z);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x444444, side: THREE.DoubleSide }));
            scene.add(mesh);
        }

        function resetScene() {
            const toRemove = [];
            scene.children.forEach(c => {
                if (c.type === 'Mesh' && c !== car && c.geometry.type === 'BufferGeometry') toRemove.push(c);
            });
            toRemove.forEach(r => scene.remove(r));
            track = [];
        }

        // --- UI & Campaign Logic ---
        function showLevelSelect() {
            document.getElementById('mainMenuScreen').style.display = 'none';
            document.getElementById('levelSelectScreen').classList.remove('hidden');
            renderLevelSelect();
        }

        function renderLevelSelect() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            trackConfigs.forEach((cfg, i) => {
                const level = i + 1;
                const prog = trackProgress[level] || { unlocked: level === 1 };
                const btn = document.createElement('div');
                btn.className = 'level-button' + (prog.unlocked ? '' : ' locked');
                btn.innerHTML = `<div>${cfg.name}</div><div style="font-size:12px">${prog.bestTime ? 'Best: '+prog.bestTime+'s' : (prog.unlocked ? 'Unlocked' : 'Locked')}</div>`;
                if(prog.unlocked) btn.onclick = () => selectLevel(level);
                grid.appendChild(btn);
            });
        }

        function selectLevel(level) {
            currentLevel = level;
            document.getElementById('levelSelectScreen').classList.add('hidden');
            createTrack(trackConfigs[level-1]);
            startGame();
        }

        function completeLevel(time) {
            alert(`Finished! Time: ${time}s`);
            if (currentLevel > 0) {
                trackProgress[currentLevel] = { unlocked: true, completed: true, bestTime: time };
                if (currentLevel < 25) trackProgress[currentLevel + 1] = { unlocked: true };
                saveProgress();
            }
            showMainMenu();
        }

        function startGame() {
            gameStarted = true;
            startTime = Date.now();
            carPhysics.position.copy(track[0]).add(new THREE.Vector3(0, 2, 0));
            lastCheckpointPosition.copy(track[0]);
            document.getElementById('mainMenuScreen').style.display = 'none';
        }

        function showMainMenu() {
            gameStarted = false;
            document.getElementById('mainMenuScreen').style.display = 'flex';
            document.getElementById('levelSelectScreen').classList.add('hidden');
            document.getElementById('trackEditorScreen').style.display = 'none';
        }

        function startQuickRace() {
            currentLevel = 0;
            createTrack(trackConfigs[0]);
            startGame();
        }

        function loadProgress() {
            const saved = localStorage.getItem('raceProgress');
            trackProgress = saved ? JSON.parse(saved) : { 1: { unlocked: true } };
        }

        function saveProgress() {
            localStorage.setItem('raceProgress', JSON.stringify(trackProgress));
        }

        // --- Editor Logic ---
        let editorPoints = [], editorScene, editorCamera, editorRenderer;
        function showTrackEditor() {
            document.getElementById('mainMenuScreen').style.display = 'none';
            document.getElementById('trackEditorScreen').style.display = 'block';
            initEditor();
        }

        function initEditor() {
            const container = document.getElementById('editorContainer');
            container.innerHTML = '';
            editorScene = new THREE.Scene();
            editorCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            editorCamera.position.set(0, 50, 100);
            editorCamera.lookAt(0,0,0);
            editorRenderer = new THREE.WebGLRenderer();
            editorRenderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(editorRenderer.domElement);
            editorScene.add(new THREE.GridHelper(200, 20));
            editorRenderer.domElement.onclick = (e) => {
                const p = new THREE.Vector3((e.clientX/window.innerWidth)*200-100, 0, (e.clientY/window.innerHeight)*200-100);
                editorPoints.push(p);
                const dot = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0x00ff00}));
                dot.position.copy(p);
                editorScene.add(dot);
            };
            function renderEditor() { if(document.getElementById('trackEditorScreen').style.display === 'block') requestAnimationFrame(renderEditor); editorRenderer.render(editorScene, editorCamera); }
            renderEditor();
        }

        function editorTestTrack() {
            if(editorPoints.length < 2) return;
            resetScene();
            track = editorPoints;
            renderTrackMesh(track);
            document.getElementById('trackEditorScreen').style.display = 'none';
            startGame();
        }

        function editorClearTrack() { editorPoints = []; initEditor(); }

        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            if (gameStarted) {
                const offset = new THREE.Vector3(0, 8, -15).applyAxisAngle(new THREE.Vector3(0,1,0), carPhysics.rotation);
                camera.position.lerp(carPhysics.position.clone().add(offset), 0.1);
                camera.lookAt(carPhysics.position);
                document.getElementById('speed').textContent = Math.round(carPhysics.speed * 100);
                document.getElementById('time').textContent = ((Date.now() - startTime)/1000).toFixed(1);
            }
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
