<h1> Welcome to my site where i display my games that i have coded in the past.</h1>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Racing - Trackmania Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial Black', sans-serif; overflow: hidden; background: #000; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        
        /* UI Overlay */
        #ui {
            position: absolute; bottom: 30px; right: 30px; color: #fff;
            text-align: right; z-index: 100; pointer-events: none; display: none;
        }
        #speedNum { font-size: 80px; font-style: italic; color: #00ffff; text-shadow: 0 0 20px #00ffff; }
        #ui-stats { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #00ffff; }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .hidden { display: none !important; }

        /* Buttons */
        .btn {
            background: #00ffff; color: #000; border: none; padding: 20px 60px;
            font-size: 24px; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s; font-weight: bold; margin: 10px; min-width: 300px;
        }
        .btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 30px #00ffff; }
        .btn.locked { background: #444; color: #888; cursor: not-allowed; }

        /* Campaign Grid */
        #levelGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;
            max-height: 70vh; overflow-y: auto; padding: 20px;
        }
        .level-card {
            background: #222; border: 2px solid #444; color: white; padding: 20px;
            text-align: center; cursor: pointer; border-radius: 5px;
        }
        .level-card.locked { opacity: 0.4; cursor: not-allowed; }
        .level-card:hover:not(.locked) { border-color: #00ffff; background: #333; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <div id="mainMenu" class="screen">
        <h1 style="color: #fff; font-size: 60px; font-style: italic; margin-bottom: 30px;">
            TRACKMANIA <span style="color:#00ffff">EVO</span>
        </h1>
        <button class="btn" onclick="startQuickRace()">QUICK RACE</button>
        <button class="btn" onclick="showCampaign()">CAMPAIGN</button>
        <p style="color: #666; margin-top: 20px;">Type "unlockall" to see all tracks</p>
    </div>

    <div id="campaignMenu" class="screen hidden">
        <h1 style="color: #00ffff; margin-bottom: 20px;">SELECT TRACK</h1>
        <div id="levelGrid"></div>
        <button class="btn" onclick="showMenu()" style="font-size: 14px; padding: 10px 30px;">BACK</button>
    </div>

    <div id="ui">
        <div id="speedNum">0</div>
        <div style="font-size: 20px;">KM/H</div>
    </div>
    <div id="ui-stats" class="hidden">
        <div id="levelDisplay">LEVEL: QUICK RACE</div>
        <div id="timeDisplay">TIME: 0.0s</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car, trackMesh;
        let gameActive = false, currentLevel = 0;
        let speed = 0, rotation = 0, startTime = 0;
        let keys = {};
        let trackPoints = [];
        let unlockedLevels = parseInt(localStorage.getItem('unlockedLevels')) || 1;

        const carPhysics = {
            accel: 0.8,
            friction: 0.985,
            maxSpeed: 800, // Capped at 800 now
            turnSpeed: 0.04
        };

        // Initialize Scene
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 100, 2000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0x00ffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                checkSecretCode(e.key.toLowerCase());
            });
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        // Secret Code Logic
        let inputLog = "";
        function checkSecretCode(key) {
            inputLog += key;
            if (inputLog.includes("unlockall")) {
                unlockedLevels = 25;
                localStorage.setItem('unlockedLevels', 25);
                showCampaign();
                inputLog = "";
            }
        }

        function createCar() {
            if (car) scene.remove(car);
            car = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.6, 4),
                new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.1 })
            );
            const neon = new THREE.Mesh(
                new THREE.BoxGeometry(2.1, 0.1, 4.1),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            neon.position.y = -0.2;
            car.add(body, neon);
            scene.add(car);
        }

        function createTrack(levelNum) {
            if (trackMesh) scene.remove(trackMesh);
            trackPoints = [];
            
            // Seeded randomness based on level number
            const complexity = 1 + (levelNum * 0.2);
            const turns = 5 + levelNum;

            for (let i = 0; i <= 500; i++) {
                const t = i / 500;
                const angle = t * Math.PI * turns;
                const x = Math.sin(angle) * (50 + (levelNum * 5));
                const y = Math.sin(t * 10) * (levelNum * 2);
                const z = i * 25;
                trackPoints.push(new THREE.Vector3(x, y, z));
            }

            const curve = new THREE.CatmullRomCurve3(trackPoints);
            const tubeGeo = new THREE.TubeGeometry(curve, 500, 10, 8, false);
            const tubeMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
            trackMesh = new THREE.Mesh(tubeGeo, tubeMat);
            scene.add(trackMesh);

            // Finish Line
            const finishGeo = new THREE.BoxGeometry(30, 20, 1);
            const finishMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            const finish = new THREE.Mesh(finishGeo, finishMat);
            finish.position.copy(trackPoints[trackPoints.length - 1]);
            scene.add(finish);
        }

        function startGame(level) {
            currentLevel = level;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('ui').style.display = 'block';
            document.getElementById('ui-stats').classList.remove('hidden');
            document.getElementById('levelDisplay').innerText = level === 0 ? "QUICK RACE" : "LEVEL " + level;

            createTrack(level);
            createCar();
            
            speed = 0;
            rotation = 0;
            car.position.copy(trackPoints[0]).y += 2;
            startTime = Date.now();
            gameActive = true;
        }

        function startQuickRace() { startGame(0); }

        function showCampaign() {
            document.getElementById('mainMenu').classList.add('hidden');
            const menu = document.getElementById('campaignMenu');
            menu.classList.remove('hidden');
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 25; i++) {
                const card = document.createElement('div');
                card.className = `level-card ${i > unlockedLevels ? 'locked' : ''}`;
                card.innerHTML = `<h3>TRACK ${i}</h3><p>${i > unlockedLevels ? '🔒 Locked' : 'READY'}</p>`;
                if (i <= unlockedLevels) card.onclick = () => startGame(i);
                grid.appendChild(card);
            }
        }

        function showMenu() {
            gameActive = false;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('ui').style.display = 'none';
            document.getElementById('ui-stats').classList.add('hidden');
        }

        function update() {
            if (!gameActive) return;

            // Physics (Speed is now internal, multiply for UI)
            if (keys['w']) speed += carPhysics.accel;
            if (keys['s']) speed -= carPhysics.accel * 2;
            speed *= carPhysics.friction;
            
            // Limit speed to carPhysics.maxSpeed
            speed = Math.min(Math.max(speed, 0), carPhysics.maxSpeed / 10);

            if (keys['a']) rotation += carPhysics.turnSpeed;
            if (keys['d']) rotation -= carPhysics.turnSpeed;

            car.position.z += Math.cos(rotation) * speed;
            car.position.x += Math.sin(rotation) * speed;
            car.rotation.y = rotation;

            // Simple Track Following
            const trackProgress = Math.min(Math.floor(car.position.z / 25), trackPoints.length - 1);
            if (trackPoints[trackProgress]) {
                car.position.y = THREE.MathUtils.lerp(car.position.y, trackPoints[trackProgress].y + 1, 0.1);
            }

            // Finish Condition
            if (car.position.z > trackPoints[trackPoints.length - 1].z) {
                if (currentLevel === unlockedLevels && unlockedLevels < 25) {
                    unlockedLevels++;
                    localStorage.setItem('unlockedLevels', unlockedLevels);
                }
                alert("FINISH! Time: " + ((Date.now() - startTime)/1000).toFixed(2) + "s");
                showCampaign();
                gameActive = false;
            }

            // Camera logic
            camera.fov = 75 + (speed * 2);
            camera.updateProjectionMatrix();
            const camOffset = new THREE.Vector3(0, 5, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotation);
            camera.position.lerp(car.position.clone().add(camOffset), 0.1);
            camera.lookAt(car.position);

            document.getElementById('speedNum').innerText = Math.floor(speed * 15);
            document.getElementById('timeDisplay').innerText = "TIME: " + ((Date.now() - startTime)/1000).toFixed(1) + "s";
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
